<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Roomzin</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>
    <header>
        <nav>
            <div class="logo">Roomzin</div>
            <div>
                <a href="index.html">Home</a>
                <a href="investors.html">Investors</a>
                <a href="technology.html">Technology</a>
                <a href="benchmarks.html">Benchmarks</a>
                <a href="docs.html">Docs</a>
                <a href="tutorials.html">Tutorials</a>
                <a href="contact.html" class="active">Contact</a>
            </div>
        </nav>
    </header>

    <div class="hero">
        <h1>Contact Roomzin</h1>
        <p>Reach out to request a demo, inquire about SDKs, or discuss investment opportunities.</p>
    </div>

    <section>
        <form action="https://formspree.io/f/your-form-id" method="POST" class="contact-form">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" required>

            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required>

            <label for="type">Inquiry Type</label>
            <select id="type" name="type">
                <option value="demo">Request Demo</option>
                <option value="sdk">SDK / Integration</option>
                <option value="investment">Investment / Partnership</option>
                <option value="other">Other</option>
            </select>

            <label for="message">Message</label>
            <textarea id="message" name="message" rows="6" required></textarea>

            <button type="submit" class="btn">Send Message</button>
        </form>
    </section>

    <section style="text-align:center; margin-top:2rem;">
        <p>Or email us directly at <a href="mailto:hello@roomzin.com">hello@roomzin.com</a></p>
    </section>

    <footer>
        <p>© 2025 Roomzin. All rights reserved.</p>
    </footer>
</body>

</html>
